# MCP-Gateway module configuration
# Each module can be enabled/disabled independently.

# Priority 1 — critical
modules:
  telegram_user:
    enabled: true
    # Pyrogram MTProto — read/monitor user account (52 tg_* tools)
    # Requires: TELEGRAM_API_ID, TELEGRAM_API_HASH, TELEGRAM_PHONE

  telegram_bot:
    enabled: true
    # Telegram Bot API — send messages with buttons, files, voice (13 bot_* tools)
    # Requires: TELEGRAM_BOT_TOKEN

  core:
    enabled: true
    # Claude Code native tools for OpenClaw mini-bot scope (13 core_* tools)
    # bash, read, write, edit, glob, grep, web_fetch, web_search, notebook, ...

# Priority 2 — important
  browser:
    enabled: true
    # Playwright CDP :18800 — browser automation (8 browser_* tools)
    # Requires: Chrome running via OpenClaw with CDP on port 18800
    # Requires: BROWSER_CDP_URL=ws://127.0.0.1:18800

  sessions:
    enabled: true
    # Sub-agent sessions via claude-code-proxy (5 session_* tools)
    # Requires: SESSIONS_PROXY_URL=http://127.0.0.1:3458

  memory:
    enabled: true
    # Semantic memory search over ~/.openclaw/workspace/memory/ (3 memory_* tools)

# Priority 3 — extensions
  tasks:
    enabled: false
    # Persistent task list — replaces broken TodoWrite/TodoRead (4 task_* tools)

  cron:
    enabled: false
    # OpenClaw Gateway cron jobs (4 cron_* tools)

  media:
    enabled: false
    # Image/PDF analysis and image generation (3 media_* tools)
